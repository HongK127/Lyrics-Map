<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>目的地攻略 · Lyrics Map</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="web-app" data-page="destination">
  <header class="site-header">
    <a class="site-mark" href="./index.html">Lyrics Map</a>
    <p>Travel is Meaningful</p>
  </header>

  <main class="detail-shell">
    <nav class="side-nav" aria-label="功能导航">
      <a href="./index.html"><span class="nav-icon">🗺️</span><span>地图总览</span></a>
      <a class="active" href="./guides.html"><span class="nav-icon">🧭</span><span>目的地攻略</span></a>
      <a href="./songs.html"><span class="nav-icon">💿</span><span>歌曲收录</span></a>
      <a href="./postcard.html"><span class="nav-icon">✉️</span><span>制作明信片</span></a>
      <a href="./planner.html"><span class="nav-icon">🎒</span><span>行程规划表</span></a>
      <a href="./ai.html"><span class="nav-icon">🎧</span><span>AI旅行歌单</span></a>
    </nav>

    <article class="journal-page">
      <section class="journal-hero">
        <img data-destination-image alt="" />
        <div>
          <p class="eyebrow" data-destination-continent></p>
          <h1 data-destination-title></h1>
          <p data-destination-intro></p>
          <blockquote data-destination-lyric></blockquote>
          <p class="concept-note" data-concept-note hidden>这是歌词意象地点，使用代表性坐标，不等同于单一城市坐标。</p>
          <p class="source-line" data-image-credit></p>
        </div>
      </section>

      <section class="local-map-section">
        <div class="local-map-card">
          <div id="localMap"></div>
        </div>
      </section>

      <section class="destination-guide-archive" data-guide-archive></section>

      <section class="recommendation-board" data-recommendation-board data-guide-content hidden></section>

      <section class="reading-panel" data-guide-content hidden>
        <div class="panel-title">
          <h2>适合带去读的书</h2>
        </div>
        <div class="reading-grid" data-reading-list></div>
      </section>

      <section class="movie-panel" data-guide-content hidden>
        <div class="panel-title">
          <h2>电影场景</h2>
          <span>Mocation 可视化链接</span>
        </div>
        <div data-movie-scene></div>
      </section>

      <section class="route-panel" data-guide-content hidden>
        <div class="panel-title">
          <h2>旅行路线</h2>
        </div>
        <ol data-route-list></ol>
      </section>

      <section class="source-board" data-guide-content hidden>
        <div class="panel-title">
          <h2>来源与核验</h2>
          <span>不伪造评分，打开来源核验实时信息</span>
        </div>
        <div data-source-list></div>
      </section>
    </article>
  </main>

  <div class="guide-drawer" data-guide-drawer hidden>
    <div class="guide-drawer-backdrop" data-close-guide-drawer></div>
    <aside class="guide-drawer-panel" aria-label="目的地攻略投稿">
      <div class="panel-title">
        <h2>目的地攻略投稿</h2>
        <button type="button" class="icon-button" data-close-guide-drawer aria-label="关闭投稿">×</button>
      </div>
      <p class="source-line" data-destination-contribution-status>提交后立即预览为完整攻略卡片</p>
      <form class="guide-package-form" data-destination-contribution-form novalidate>
        <label>攻略标题<input type="text" data-package-title placeholder="巴黎完整旅行攻略"></label>
        <label>投稿人<input type="text" data-package-contributor placeholder="昵称 / 来源账号"></label>
        <label>封面图<input type="file" accept="image/*" data-package-cover></label>
        <label>来源链接<input type="url" data-package-source-url placeholder="https://"></label>
        <label class="form-wide">攻略简介<textarea data-package-summary placeholder="这份攻略适合怎样的旅行者，和哪句歌词最贴近"></textarea></label>
        <label class="form-wide">吃<textarea data-package-eat placeholder="每行一条：名称 | 区域 | 推荐理由 | 来源链接 | 纬度 | 经度"></textarea></label>
        <label class="form-wide">住<textarea data-package-stay placeholder="每行一条：名称 | 区域 | 推荐理由 | 来源链接 | 纬度 | 经度"></textarea></label>
        <label class="form-wide">行<textarea data-package-move placeholder="每行一条：名称 | 区域 | 推荐理由 | 来源链接 | 纬度 | 经度"></textarea></label>
        <label class="form-wide">购物<textarea data-package-shop placeholder="每行一条：名称 | 区域 | 推荐理由 | 来源链接 | 纬度 | 经度"></textarea></label>
        <label class="form-wide">阅读与书籍路线<textarea data-package-reading placeholder="每行一条：书名 | 作者 | 说明 | 来源链接"></textarea></label>
        <label class="form-wide">7天旅行路线<textarea data-package-seven-day-route placeholder="每行一条：Day | 标题 | 区域 | 上午 | 下午 | 晚上 | 备注 | 来源链接 | 纬度 | 经度"></textarea></label>
        <button type="submit">提交完整攻略投稿</button>
      </form>
    </aside>
  </div>

  <script src="/config.js?v=amap-20260502"></script>
  <script src="./data.js"></script>
  <script src="./app.js?v=lyrics-map-20260511-guide-package"></script>
</body>
</html>
