<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>歌曲收录 · Lyrics Map</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="web-app" data-page="songs">
  <header class="site-header">
    <a class="site-mark" href="./index.html">Lyrics Map</a>
    <p>Travel is Meaningful</p>
  </header>

  <main class="archive-shell">
    <nav class="side-nav" aria-label="功能导航">
      <a href="./index.html"><span class="nav-icon">🗺️</span><span>地图总览</span></a>
      <a href="./guides.html"><span class="nav-icon">🧭</span><span>目的地攻略</span></a>
      <a class="active" href="./songs.html"><span class="nav-icon">💿</span><span>歌曲收录</span></a>
      <a href="./postcard.html"><span class="nav-icon">✉️</span><span>制作明信片</span></a>
      <a href="./planner.html"><span class="nav-icon">🎒</span><span>行程规划表</span></a>
      <a href="./ai.html"><span class="nav-icon">🎧</span><span>AI旅行歌单</span></a>
    </nav>

    <section class="archive-content">
      <div class="archive-head">
        <p class="eyebrow">song module</p>
        <h1>歌曲、作品与地点关系</h1>
        <p>修正歌曲归属与封面来源；每张卡片保留事实来源、封面来源与关联目的地。</p>
      </div>
      <section class="contribution-panel song-contribution-panel">
        <div class="panel-title">
          <h2>歌曲投稿</h2>
          <span data-song-contribution-status>提交后立即预览，标记待收录</span>
        </div>
        <form class="guide-edit-form" data-song-contribution-form novalidate>
          <label>歌曲名<input type="text" data-song-title placeholder="歌曲名"></label>
          <label>歌手<input type="text" data-song-artist placeholder="歌手"></label>
          <label>专辑 / 来源<input type="text" data-song-album placeholder="专辑、EP 或资料来源"></label>
          <label>关联地点<input type="text" data-song-places placeholder="巴黎 / 北京 / 九份"></label>
          <label class="form-wide">歌词片段或说明<textarea data-song-lyric placeholder="写下关联地点的歌词片段、出处或补充说明"></textarea></label>
          <label class="form-wide">来源链接<input type="url" data-song-source-url placeholder="https://"></label>
          <button type="submit">提交歌曲投稿</button>
        </form>
      </section>
      <div class="song-grid" data-song-grid></div>
    </section>
  </main>

  <script src="./data.js"></script>
  <script src="./app.js?v=lyrics-map-20260507"></script>
</body>
</html>
